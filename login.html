<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In – CyberInspect</title>
<link rel="stylesheet" href="assets/css/variables.css">
<link rel="stylesheet" href="assets/css/animations.css">
<link rel="stylesheet" href="assets/css/common.css">
<link rel="stylesheet" href="frontend/login/login.css">
<link rel="stylesheet" href="styles.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<div id="auth-screen" class="auth-screen">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="logo-shield">🛡️</div>
      <h1>Cyber<span>Inspect</span></h1>
      <p>Website Security Assessment Platform</p>
    </div>

    <form id="login-form" class="auth-form active">
      <h2>Sign In</h2>
      <div class="input-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" required>
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Sign In</button>
      <p class="auth-switch">No account? <a onclick="showRegister()">Create one</a></p>
      <p class="auth-hint">Demo: admin@cyberinspect.io / admin123 · Or user@demo.io / user123</p>
    </form>

    <form id="register-form" class="auth-form">
      <h2>Create Account</h2>
      <div class="input-group">
        <label>Full Name</label>
        <input type="text" id="reg-name" placeholder="Jane Doe" required>
      </div>
      <div class="input-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com" required>
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="Min. 8 characters" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Create Account</button>
      <p class="auth-switch">Have an account? <a onclick="showLogin()">Sign in</a></p>
    </form>
  </div>
</div>

<script src="frontend/js/storage.js"></script>
<script src="backend/utils/utils.js"></script>
<script src="backend/api/api.js"></script>
<script src="backend/auth/auth.js"></script>
<script src="frontend/login/login.js"></script>
</body>
</html>
